name: Dummy NodeJS Instrumentation Main Build
on:
  workflow_dispatch:
    inputs:
      should_fail:
        description: 'Should this build fail? (true/false)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    branches:
      - main

jobs:
  dummy-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Simulate build process
        run: |
          echo "🚀 Starting dummy main build..."
          echo "✅ Checking package.json syntax..."
          cat package.json | jq . > /dev/null
          echo "✅ Package.json is valid!"
          
      - name: Simulate tests
        run: |
          echo "🧪 Running dummy tests..."
          sleep 10
          if [ "${{ github.event.inputs.should_fail }}" = "true" ]; then
            echo "❌ Tests failed! (Intentional failure for testing)"
            exit 1
          else
            echo "✅ All tests passed!"
          fi
          
      - name: Build complete
        run: |
          echo "🎉 Dummy main build completed successfully!"
          echo "This build can be used to test the wait-for-main-build logic."
